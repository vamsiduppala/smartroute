apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartroute
  labels:
    app: smartroute
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartroute
  template:
    metadata:
      labels:
        app: smartroute
    spec:
      containers:
        - name: smartroute
          image: smartroute:0.1.0
          # Pinned, locally-built tag (never pushed to a registry): IfNotPresent avoids a
          # pointless registry pull attempt and reuses the node-local image. Explicit rather
          # than relying on the version-tag default, which only kicks in for non-":latest" tags.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartroute-secrets
                  key: openai-api-key
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 1
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
