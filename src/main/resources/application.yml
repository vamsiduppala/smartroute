server:
  # Honor a platform-injected $PORT (Render/Railway/Fly/Heroku all set it) so the same image
  # runs locally on 8080 and on any PaaS unchanged. Falls back to 8080 when PORT is unset.
  port: ${PORT:8080}

spring:
  application:
    name: smartroute
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      # GPT-5.6 rides the standard OpenAI API surface; base-url stays default.
      chat:
        options:
          # Default tier if the classifier is bypassed. The router overrides this per-request.
          model: gpt-5.6-terra
          temperature: 0.2

# SmartRoute's own tunables. Every value here is the built-in default (bound via @Value in the
# respective component) -- listed explicitly so the knobs are discoverable and overridable per
# environment, rather than hidden in the code. Override via env vars too, e.g.
# SMARTROUTE_GOVERNANCE_RATE_CAPACITY=50.
smartroute:
  governance:
    default-cap-usd: 10.0        # per-tenant spend cap (USD) before requests are downgraded/rejected
    rate:
      capacity: 20               # per-tenant request burst (token-bucket size)
      refill-per-sec: 10         # steady-state requests/sec the bucket refills at
  cache:
    ttl-seconds: 300             # how long an exact-match response stays cacheable (0 disables caching)
    max-entries: 10000           # response-cache size bound

management:
  endpoints:
    web:
      exposure:
        # Expose the Prometheus scrape endpoint alongside health so the per-tier telemetry
        # (smartroute_calls_total, smartroute_cost_usd_total, smartroute_latency_*) is scrapeable.
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
