spring:
  application:
    name: smartroute
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      # GPT-5.6 rides the standard OpenAI API surface; base-url stays default.
      chat:
        options:
          # Default tier if the classifier is bypassed. The router overrides this per-request.
          model: gpt-5.6-terra
          temperature: 0.2

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
